<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传照片 - Q版头像定制</title>
    <style id="theme-vars">
/* Q版小人 - 可爱Q萌风格 Brand CSS */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap');

:root {
  /* Brand Primary - 暖橙色系 */
  --color-primary: #FF7B54;
  --color-primary-light: #FFB088;
  --color-primary-dark: #E85D3A;
  --color-primary-50: #FFF5F0;
  --color-primary-100: #FFE8DB;
  --color-primary-200: #FFD0B5;
  --color-primary-300: #FFB088;
  --color-primary-400: #FF9466;
  --color-primary-500: #FF7B54;
  --color-primary-600: #E85D3A;
  --color-primary-700: #CC4A2B;
  --color-primary-800: #A63D23;
  --color-primary-900: #802F1B;

  /* Neutral Colors */
  --color-gray-50: #FAFAF7;
  --color-gray-100: #F5F3EF;
  --color-gray-200: #E8E5E0;
  --color-gray-300: #D4D0CA;
  --color-gray-400: #A8A29E;
  --color-gray-500: #78716C;
  --color-gray-600: #57534E;
  --color-gray-700: #44403C;
  --color-gray-800: #292524;
  --color-gray-900: #1C1917;

  /* Status Colors */
  --color-success: #4ADE80;
  --color-warning: #FBBF24;
  --color-error: #F87171;
  --color-info: #60A5FA;

  /* Background */
  --color-bg-primary: #FFF8F5;
  --color-bg-secondary: #FFFFFF;
  --color-bg-tertiary: #FDF2EC;

  /* Typography */
  --font-family-primary: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-size-xs: 10px;
  --font-size-sm: 12px;
  --font-size-base: 14px;
  --font-size-md: 16px;
  --font-size-lg: 18px;
  --font-size-xl: 20px;
  --font-size-2xl: 24px;
  --font-size-3xl: 30px;
  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;
  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;

  /* Spacing */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* Border Radius - Q版圆润风格 */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 24px;
  --radius-full: 9999px;

  /* Shadows - 柔和阴影 */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.05);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.08);
  --shadow-xl: 0 12px 32px rgba(0, 0, 0, 0.1);
  --shadow-primary: 0 4px 16px rgba(255, 123, 84, 0.25);

  /* Transitions */
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --transition-slow: 350ms ease;
}

/* Base Styles */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: var(--font-family-primary);
  font-size: var(--font-size-base);
  line-height: var(--line-height-normal);
  color: var(--color-gray-800);
  background-color: var(--color-bg-primary);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Q版特色组件样式 */
.q-card {
  background: var(--color-bg-secondary);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-md);
  padding: var(--space-4);
}

.q-button-primary {
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: white;
  border: none;
  border-radius: var(--radius-full);
  padding: var(--space-3) var(--space-6);
  font-weight: var(--font-weight-semibold);
  font-size: var(--font-size-base);
  cursor: pointer;
  transition: all var(--transition-normal);
  box-shadow: var(--shadow-primary);
}

.q-button-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255, 123, 84, 0.35);
}

.q-button-primary:active {
  transform: translateY(0);
}

.q-button-secondary {
  background: var(--color-bg-secondary);
  color: var(--color-primary);
  border: 2px solid var(--color-primary);
  border-radius: var(--radius-full);
  padding: var(--space-3) var(--space-6);
  font-weight: var(--font-weight-semibold);
  font-size: var(--font-size-base);
  cursor: pointer;
  transition: all var(--transition-normal);
}

.q-button-secondary:hover {
  background: var(--color-primary-50);
}

.q-tab {
  display: flex;
  background: var(--color-bg-secondary);
  border-radius: var(--radius-full);
  padding: var(--space-1);
  box-shadow: var(--shadow-sm);
}

.q-tab-item {
  flex: 1;
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-full);
  font-weight: var(--font-weight-medium);
  font-size: var(--font-size-sm);
  color: var(--color-gray-500);
  cursor: pointer;
  transition: all var(--transition-fast);
  text-align: center;
}

.q-tab-item.active {
  background: var(--color-primary);
  color: white;
  box-shadow: var(--shadow-primary);
}

.q-avatar {
  border-radius: var(--radius-full);
  border: 4px solid var(--color-primary);
  box-shadow: var(--shadow-lg);
}

.q-category-pill {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-full);
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-medium);
  cursor: pointer;
  transition: all var(--transition-fast);
  white-space: nowrap;
}

.q-category-pill.active {
  background: var(--color-primary);
  color: white;
}

.q-category-pill:not(.active) {
  background: var(--color-bg-secondary);
  color: var(--color-gray-600);
  border: 1px solid var(--color-gray-200);
}

.q-option-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--space-2);
}

.q-option-item {
  aspect-ratio: 1;
  border-radius: var(--radius-lg);
  border: 2px solid var(--color-gray-200);
  background: var(--color-bg-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.q-option-item:hover {
  border-color: var(--color-primary-light);
}

.q-option-item.selected {
  border-color: var(--color-primary);
  background: var(--color-primary-50);
  box-shadow: 0 0 0 3px rgba(255, 123, 84, 0.15);
}

.q-color-swatch {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-full);
  border: 3px solid transparent;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.q-color-swatch:hover {
  transform: scale(1.1);
}

.q-color-swatch.selected {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 2px white, 0 0 0 4px var(--color-primary);
}

.q-upload-zone {
  border: 2px dashed var(--color-gray-300);
  border-radius: var(--radius-xl);
  padding: var(--space-8);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all var(--transition-normal);
  background: var(--color-bg-tertiary);
}

.q-upload-zone:hover {
  border-color: var(--color-primary);
  background: var(--color-primary-50);
}

.q-upload-zone.dragging {
  border-color: var(--color-primary);
  background: var(--color-primary-100);
  transform: scale(1.02);
}

.q-slider {
  width: 100%;
  height: 4px;
  border-radius: var(--radius-full);
  background: var(--color-gray-200);
  outline: none;
  -webkit-appearance: none;
}

.q-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  border-radius: var(--radius-full);
  background: var(--color-primary);
  cursor: pointer;
  box-shadow: var(--shadow-md);
}

/* Utilities */
.text-primary { color: var(--color-primary); }
.text-gray-400 { color: var(--color-gray-400); }
.text-gray-500 { color: var(--color-gray-500); }
.text-gray-600 { color: var(--color-gray-600); }
.bg-primary { background-color: var(--color-primary); }
.bg-primary-50 { background-color: var(--color-primary-50); }
.bg-white { background-color: white; }
.rounded-full { border-radius: var(--radius-full); }
.shadow-md { box-shadow: var(--shadow-md); }
.shadow-lg { box-shadow: var(--shadow-lg); }

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
  }
  @layer base {
    body { background: var(--color-bg-primary); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>
  <!-- 页面容器 - 移动端 375px 目标 -->
  <div class="mx-auto" style="max-width: 420px; min-height: 100vh; display: flex; flex-direction: column;">

    <!-- ========== 顶部导航栏 ========== -->
    <header class="flex items-center justify-between px-5 pt-4 pb-3" style="padding-top: max(16px, env(safe-area-inset-top));">
      <!-- 返回按钮 -->
      <button class="w-10 h-10 flex items-center justify-center rounded-full transition-colors"
              style="background: var(--color-bg-secondary); box-shadow: var(--shadow-sm);"
              aria-label="返回">
        <i data-lucide="chevron-left" style="width: 22px; height: 22px; color: var(--color-gray-700);"></i>
      </button>

      <!-- 标题 -->
      <h1 style="font-size: var(--font-size-xl); font-weight: var(--font-weight-bold); color: var(--color-gray-800); letter-spacing: 0.5px;">
        定制头像
      </h1>

      <!-- 随机/换一批按钮 -->
      <button class="w-10 h-10 flex items-center justify-center rounded-full transition-colors"
              style="background: var(--color-bg-secondary); box-shadow: var(--shadow-sm);"
              aria-label="随机生成">
        <i data-lucide="shuffle" style="width: 20px; height: 20px; color: var(--color-gray-600);"></i>
      </button>
    </header>

    <!-- ========== 标签页切换 ========== -->
    <div class="px-5 pb-4">
      <div class="q-tab">
        <button class="q-tab-item active" data-dom-id="tab-upload">上传照片</button>
        <button class="q-tab-item" data-dom-id="tab-customize">素材捏脸</button>
      </div>
    </div>

    <!-- ========== 主内容区域 ========== -->
    <main class="flex-1 flex flex-col px-5 pb-6 gap-5" style="gap: 20px;">

      <!-- ===== 预览区域 ===== -->
      <section class="flex flex-col items-center gap-4" style="gap: 16px;">
        <p style="font-size: var(--font-size-sm); color: var(--color-gray-400); font-weight: var(--font-weight-medium);">头像预览</p>

        <!-- Q版小人头像占位 -->
        <div class="crop-overlay flex items-center justify-center" id="avatar-preview">
          <!-- 初始状态：SVG占位符 -->
          <div id="placeholder-avatar" class="flex flex-col items-center justify-center" style="width: 100%; height: 100%; background: linear-gradient(135deg, var(--color-primary-50) 0%, var(--color-primary-100) 100%);">
            <svg viewBox="0 0 160 160" style="width: 100%; height: 100%; padding: 12px;">
              <!-- 身体 - 圆润Q版 -->
              <ellipse cx="80" cy="118" rx="28" ry="24" fill="var(--color-primary)" opacity="0.15"/>
              <!-- 头 - 大大圆圆 -->
              <circle cx="80" cy="72" r="42" fill="var(--color-primary)" opacity="0.12"/>
              <circle cx="80" cy="72" r="38" fill="var(--color-primary)" opacity="0.08"/>
              <!-- 脸颊腮红 -->
              <circle cx="58" cy="80" r="8" fill="var(--color-primary)" opacity="0.15"/>
              <circle cx="102" cy="80" r="8" fill="var(--color-primary)" opacity="0.15"/>
              <!-- 眼睛 -->
              <circle cx="68" cy="70" r="4" fill="var(--color-primary)" opacity="0.3"/>
              <circle cx="92" cy="70" r="4" fill="var(--color-primary)" opacity="0.3"/>
              <!-- 嘴巴 - 小笑脸 -->
              <path d="M72 82 Q80 90 88 82" stroke="var(--color-primary)" stroke-width="2.5" fill="none" opacity="0.3" stroke-linecap="round"/>
              <!-- 刘海 -->
              <path d="M52 58 Q60 40 80 38 Q100 40 108 58" stroke="var(--color-primary)" stroke-width="2" fill="none" opacity="0.2" stroke-linecap="round"/>
              <!-- +号提示上传 -->
              <line x1="80" y1="135" x2="80" y2="148" stroke="var(--color-primary)" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
              <line x1="73.5" y1="141.5" x2="86.5" y2="141.5" stroke="var(--color-primary)" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
            </svg>
          </div>
          <!-- 上传后：图片预览（初始隐藏） -->
          <img id="preview-image" class="section-hidden" style="width: 100%; height: 100%; object-fit: cover;" alt="头像预览" />
          <!-- 十字辅助线（初始隐藏） -->
          <div id="crosshair-lines" class="crosshair section-hidden" style="position: absolute; inset: 0; pointer-events: none;"></div>
        </div>

        <!-- 状态提示 -->
        <p id="preview-hint" class="fade-in" style="font-size: var(--font-size-sm); color: var(--color-gray-400);">
          上传照片后将自动裁剪为 Q版大头
        </p>
      </section>

      <!-- ===== 上传区域 (初始显示) ===== -->
      <section id="upload-section" class="fade-in">
        <div class="q-upload-zone" data-dom-id="upload-zone" id="upload-zone">
          <input type="file" accept="image/jpeg,image/png" id="file-input" aria-label="选择照片上传" />
          <!-- 上传图标 -->
          <div class="flex items-center justify-center mb-3" style="width: 56px; height: 56px; border-radius: 50%; background: var(--color-primary-100);">
            <i data-lucide="cloud-upload" style="width: 28px; height: 28px; color: var(--color-primary);"></i>
          </div>
          <!-- 上传文字 -->
          <p style="font-size: var(--font-size-md); font-weight: var(--font-weight-semibold); color: var(--color-gray-700); margin-bottom: 4px;">
            拖拽或点击上传
          </p>
          <!-- 格式提示 -->
          <p style="font-size: var(--font-size-sm); color: var(--color-gray-400);">
            支持 JPG、PNG 格式，建议正方形照片
          </p>
        </div>
      </section>

      <!-- ===== 调整控件区域 (初始隐藏，选图后显示) ===== -->
      <section id="adjust-section" class="section-hidden" style="gap: 20px;">

        <!-- 拖动提示 -->
        <div class="flex items-center justify-center gap-2" style="gap: 6px; padding: 8px 0;">
          <i data-lucide="move" style="width: 16px; height: 16px; color: var(--color-primary);"></i>
          <span style="font-size: var(--font-size-sm); color: var(--color-primary); font-weight: var(--font-weight-medium);">
            拖动图片调整位置
          </span>
        </div>

        <!-- 缩放滑块 -->
        <div class="q-card" style="padding: 16px;">
          <div class="flex items-center justify-between mb-3" style="margin-bottom: 12px;">
            <div class="flex items-center gap-2" style="gap: 6px;">
              <i data-lucide="zoom-out" style="width: 18px; height: 18px; color: var(--color-gray-500);"></i>
              <span style="font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); color: var(--color-gray-600);">缩放</span>
            </div>
            <span id="zoom-value" style="font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); color: var(--color-primary); min-width: 36px; text-align: right;">100%</span>
          </div>
          <div class="flex items-center gap-3" style="gap: 12px;">
            <i data-lucide="minus-circle" style="width: 16px; height: 16px; color: var(--color-gray-400); flex-shrink: 0;"></i>
            <input type="range" class="q-slider" data-dom-id="zoom-slider" id="zoom-slider"
                   min="50" max="200" value="100" step="1" />
            <i data-lucide="plus-circle" style="width: 16px; height: 16px; color: var(--color-gray-400); flex-shrink: 0;"></i>
          </div>
        </div>

        <!-- 旋转滑块 -->
        <div class="q-card" style="padding: 16px;">
          <div class="flex items-center justify-between mb-3" style="margin-bottom: 12px;">
            <div class="flex items-center gap-2" style="gap: 6px;">
              <i data-lucide="rotate-cw" style="width: 18px; height: 18px; color: var(--color-gray-500);"></i>
              <span style="font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); color: var(--color-gray-600);">旋转</span>
            </div>
            <span id="rotation-value" style="font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); color: var(--color-primary); min-width: 36px; text-align: right;">0&deg;</span>
          </div>
          <div class="flex items-center gap-3" style="gap: 12px;">
            <i data-lucide="undo" style="width: 16px; height: 16px; color: var(--color-gray-400); flex-shrink: 0;"></i>
            <input type="range" class="q-slider" data-dom-id="rotation-slider" id="rotation-slider"
                   min="-180" max="180" value="0" step="1" />
            <i data-lucide="redo" style="width: 16px; height: 16px; color: var(--color-gray-400); flex-shrink: 0;"></i>
          </div>
        </div>

        <!-- 操作按钮组 -->
        <div class="flex items-center justify-center gap-3" style="gap: 12px; padding-top: 8px;">
          <button class="q-button-ghost flex items-center gap-2" data-dom-id="cancel-btn"
                  style="gap: 6px; padding: 10px 20px;">
            <i data-lucide="x" style="width: 18px; height: 18px;"></i>
            <span>取消</span>
          </button>
          <button class="q-button-secondary flex items-center gap-2" data-dom-id="reset-btn"
                  style="gap: 6px; padding: 10px 20px;">
            <i data-lucide="refresh-cw" style="width: 18px; height: 18px;"></i>
            <span>重置</span>
          </button>
          <button class="q-button-primary flex items-center gap-2" data-dom-id="crop-btn"
                  style="gap: 6px; padding: 10px 24px;">
            <i data-lucide="scissors" style="width: 18px; height: 18px;"></i>
            <span>确认裁剪</span>
          </button>
        </div>
      </section>

      <!-- ===== 裁剪结果区域 (初始隐藏，裁剪完成后显示) ===== -->
      <section id="result-section" class="section-hidden flex-col items-center scale-in" style="gap: 16px;">

        <!-- 成功图标 -->
        <div class="check-pop flex items-center justify-center" style="width: 44px; height: 44px; border-radius: 50%; background: rgba(74, 222, 128, 0.12);">
          <i data-lucide="check" style="width: 24px; height: 24px; color: #22C55E;"></i>
        </div>

        <!-- 裁剪后头像 -->
        <div class="result-circle relative">
          <img id="result-image" style="width: 100%; height: 100%; object-fit: cover;" alt="裁剪后的头像" />
          <!-- 移除按钮 -->
          <button class="absolute flex items-center justify-center" data-dom-id="remove-result"
                  style="top: -4px; right: -4px; width: 24px; height: 24px; border-radius: 50%; background: var(--color-error); box-shadow: 0 2px 6px rgba(248,113,113,0.4); border: 2px solid white;"
                  aria-label="移除头像">
            <i data-lucide="x" style="width: 12px; height: 12px; color: white;"></i>
          </button>
        </div>

        <!-- 成功文字 -->
        <p style="font-size: var(--font-size-md); font-weight: var(--font-weight-bold); color: var(--color-gray-800);">
          头像裁剪完成
        </p>
        <p style="font-size: var(--font-size-sm); color: var(--color-gray-400);">
          Q版小人头像已生成，可以去捏脸页面进一步定制
        </p>

        <!-- 重新调整链接 -->
        <button data-dom-id="re-adjust"
                class="flex items-center gap-2 transition-colors"
                style="gap: 6px; padding: 8px 16px; border-radius: var(--radius-full); background: var(--color-primary-50); border: none; cursor: pointer; font-family: var(--font-family-primary);">
          <i data-lucide="rotate-ccw" style="width: 16px; height: 16px; color: var(--color-primary);"></i>
          <span style="font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); color: var(--color-primary);">重新调整</span>
        </button>
      </section>

    </main>

    <!-- ========== 底部安全区域占位 ========== -->
    <div style="padding-bottom: max(16px, env(safe-area-inset-bottom));"></div>
  </div>

  <!-- ========== 脚本：Lucide 图标初始化 ========== -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // 初始化 Lucide 图标
      if (window.lucide) {
        lucide.createIcons();
      }

      // --- 交互逻辑 ---
      var fileInput = document.getElementById('file-input');
      var uploadZone = document.getElementById('upload-zone');
      var uploadSection = document.getElementById('upload-section');
      var adjustSection = document.getElementById('adjust-section');
      var resultSection = document.getElementById('result-section');
      var placeholderAvatar = document.getElementById('placeholder-avatar');
      var previewImage = document.getElementById('preview-image');
      var crosshairLines = document.getElementById('crosshair-lines');
      var previewHint = document.getElementById('preview-hint');
      var resultImage = document.getElementById('result-image');

      var zoomSlider = document.getElementById('zoom-slider');
      var rotationSlider = document.getElementById('rotation-slider');
      var zoomValue = document.getElementById('zoom-value');
      var rotationValue = document.getElementById('rotation-value');

      // 拖拽效果
      uploadZone.addEventListener('dragover', function(e) {
        e.preventDefault();
        uploadZone.classList.add('dragover');
      });
      uploadZone.addEventListener('dragleave', function() {
        uploadZone.classList.remove('dragover');
      });
      uploadZone.addEventListener('drop', function(e) {
        e.preventDefault();
        uploadZone.classList.remove('dragover');
        var files = e.dataTransfer.files;
        if (files.length > 0) {
          handleFile(files[0]);
        }
      });

      // 文件选择
      fileInput.addEventListener('change', function(e) {
        if (e.target.files.length > 0) {
          handleFile(e.target.files[0]);
        }
      });

      // 处理选中的文件
      function handleFile(file) {
        if (!file.type.match('image/jpeg') && !file.type.match('image/png')) {
          return;
        }
        var reader = new FileReader();
        reader.onload = function(e) {
          previewImage.src = e.target.result;
          showAdjustMode();
        };
        reader.readAsDataURL(file);
      }

      // 显示调整模式
      function showAdjustMode() {
        uploadSection.classList.add('section-hidden');
        adjustSection.classList.remove('section-hidden');
        adjustSection.classList.add('section-visible', 'fade-in');
        resultSection.classList.add('section-hidden');
        placeholderAvatar.classList.add('section-hidden');
        previewImage.classList.remove('section-hidden');
        crosshairLines.classList.remove('section-hidden');
        previewHint.textContent = '调整缩放和旋转，然后确认裁剪';
        previewHint.style.color = 'var(--color-primary)';
      }

      // 显示结果模式
      function showResultMode() {
        adjustSection.classList.add('section-hidden');
        adjustSection.classList.remove('section-visible');
        resultSection.classList.remove('section-hidden');
        resultSection.classList.add('section-visible');
        resultImage.src = previewImage.src;
        previewHint.textContent = '头像裁剪完成!';
        previewHint.style.color = 'var(--color-success)';
      }

      // 显示上传模式（初始状态）
      function showUploadMode() {
        uploadSection.classList.remove('section-hidden');
        adjustSection.classList.add('section-hidden');
        adjustSection.classList.remove('section-visible');
        resultSection.classList.add('section-hidden');
        resultSection.classList.remove('section-visible');
        placeholderAvatar.classList.remove('section-hidden');
        previewImage.classList.add('section-hidden');
        crosshairLines.classList.add('section-hidden');
        previewImage.src = '';
        previewImage.style.transform = '';
        previewHint.textContent = '上传照片后将自动裁剪为 Q版大头';
        previewHint.style.color = 'var(--color-gray-400)';
        zoomSlider.value = 100;
        rotationSlider.value = 0;
        zoomValue.textContent = '100%';
        rotationValue.innerHTML = '0&deg;';
        fileInput.value = '';
      }

      // 缩放滑块
      zoomSlider.addEventListener('input', function() {
        var val = zoomSlider.value;
        zoomValue.textContent = val + '%';
        updatePreviewTransform();
      });

      // 旋转滑块
      rotationSlider.addEventListener('input', function() {
        var val = rotationSlider.value;
        rotationValue.innerHTML = val + '&deg;';
        updatePreviewTransform();
      });

      // 更新预览变换
      function updatePreviewTransform() {
        var scale = zoomSlider.value / 100;
        var rotate = rotationSlider.value;
        previewImage.style.transform = 'scale(' + scale + ') rotate(' + rotate + 'deg)';
      }

      // 取消按钮
      document.querySelector('[data-dom-id="cancel-btn"]').addEventListener('click', function() {
        showUploadMode();
      });

      // 重置按钮
      document.querySelector('[data-dom-id="reset-btn"]').addEventListener('click', function() {
        zoomSlider.value = 100;
        rotationSlider.value = 0;
        zoomValue.textContent = '100%';
        rotationValue.innerHTML = '0&deg;';
        previewImage.style.transform = '';
      });

      // 确认裁剪按钮
      document.querySelector('[data-dom-id="crop-btn"]').addEventListener('click', function() {
        showResultMode();
      });

      // 移除结果按钮
      document.querySelector('[data-dom-id="remove-result"]').addEventListener('click', function() {
        showUploadMode();
      });

      // 重新调整按钮
      document.querySelector('[data-dom-id="re-adjust"]').addEventListener('click', function() {
        showAdjustMode();
        previewImage.src = resultImage.src;
      });

      // 标签页切换
      document.querySelector('[data-dom-id="tab-upload"]').addEventListener('click', function() {
        this.classList.add('active');
        document.querySelector('[data-dom-id="tab-customize"]').classList.remove('active');
      });
      document.querySelector('[data-dom-id="tab-customize"]').addEventListener('click', function() {
        this.classList.add('active');
        document.querySelector('[data-dom-id="tab-upload"]').classList.remove('active');
      });
    });
  </script>
</body>
</html>
