<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>

    <title>定制头像 - Q版小人</title>
    <style id="theme-vars">
/* Q版小人 - 可爱Q萌风格 Brand CSS */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap');

:root {
  /* Brand Primary - 暖橙色系 */
  --color-primary: #FF7B54;
  --color-primary-light: #FFB088;
  --color-primary-dark: #E85D3A;
  --color-primary-50: #FFF5F0;
  --color-primary-100: #FFE8DB;
  --color-primary-200: #FFD0B5;
  --color-primary-300: #FFB088;
  --color-primary-400: #FF9466;
  --color-primary-500: #FF7B54;
  --color-primary-600: #E85D3A;
  --color-primary-700: #CC4A2B;
  --color-primary-800: #A63D23;
  --color-primary-900: #802F1B;

  /* Neutral Colors */
  --color-gray-50: #FAFAF7;
  --color-gray-100: #F5F3EF;
  --color-gray-200: #E8E5E0;
  --color-gray-300: #D4D0CA;
  --color-gray-400: #A8A29E;
  --color-gray-500: #78716C;
  --color-gray-600: #57534E;
  --color-gray-700: #44403C;
  --color-gray-800: #292524;
  --color-gray-900: #1C1917;

  /* Status Colors */
  --color-success: #4ADE80;
  --color-warning: #FBBF24;
  --color-error: #F87171;
  --color-info: #60A5FA;

  /* Background */
  --color-bg-primary: #FFF8F5;
  --color-bg-secondary: #FFFFFF;
  --color-bg-tertiary: #FDF2EC;

  /* Typography */
  --font-family-primary: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-size-xs: 10px;
  --font-size-sm: 12px;
  --font-size-base: 14px;
  --font-size-md: 16px;
  --font-size-lg: 18px;
  --font-size-xl: 20px;
  --font-size-2xl: 24px;
  --font-size-3xl: 30px;
  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;
  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;

  /* Spacing */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* Border Radius - Q版圆润风格 */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 24px;
  --radius-full: 9999px;

  /* Shadows - 柔和阴影 */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.05);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.08);
  --shadow-xl: 0 12px 32px rgba(0, 0, 0, 0.1);
  --shadow-primary: 0 4px 16px rgba(255, 123, 84, 0.25);

  /* Transitions */
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --transition-slow: 350ms ease;
}

/* Base Styles */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: var(--font-family-primary);
  font-size: var(--font-size-base);
  line-height: var(--line-height-normal);
  color: var(--color-gray-800);
  background-color: var(--color-bg-primary);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Q版特色组件样式 */
.q-card {
  background: var(--color-bg-secondary);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-md);
  padding: var(--space-4);
}

.q-button-primary {
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: white;
  border: none;
  border-radius: var(--radius-full);
  padding: var(--space-3) var(--space-6);
  font-weight: var(--font-weight-semibold);
  font-size: var(--font-size-base);
  cursor: pointer;
  transition: all var(--transition-normal);
  box-shadow: var(--shadow-primary);
}

.q-button-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255, 123, 84, 0.35);
}

.q-button-primary:active {
  transform: translateY(0);
}

.q-button-secondary {
  background: var(--color-bg-secondary);
  color: var(--color-primary);
  border: 2px solid var(--color-primary);
  border-radius: var(--radius-full);
  padding: var(--space-3) var(--space-6);
  font-weight: var(--font-weight-semibold);
  font-size: var(--font-size-base);
  cursor: pointer;
  transition: all var(--transition-normal);
}

.q-button-secondary:hover {
  background: var(--color-primary-50);
}

.q-tab {
  display: flex;
  background: var(--color-bg-secondary);
  border-radius: var(--radius-full);
  padding: var(--space-1);
  box-shadow: var(--shadow-sm);
}

.q-tab-item {
  flex: 1;
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-full);
  font-weight: var(--font-weight-medium);
  font-size: var(--font-size-sm);
  color: var(--color-gray-500);
  cursor: pointer;
  transition: all var(--transition-fast);
  text-align: center;
}

.q-tab-item.active {
  background: var(--color-primary);
  color: white;
  box-shadow: var(--shadow-primary);
}

.q-avatar {
  border-radius: var(--radius-full);
  border: 4px solid var(--color-primary);
  box-shadow: var(--shadow-lg);
}

.q-category-pill {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-full);
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-medium);
  cursor: pointer;
  transition: all var(--transition-fast);
  white-space: nowrap;
}

.q-category-pill.active {
  background: var(--color-primary);
  color: white;
}

.q-category-pill:not(.active) {
  background: var(--color-bg-secondary);
  color: var(--color-gray-600);
  border: 1px solid var(--color-gray-200);
}

.q-option-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--space-2);
}

.q-option-item {
  aspect-ratio: 1;
  border-radius: var(--radius-lg);
  border: 2px solid var(--color-gray-200);
  background: var(--color-bg-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.q-option-item:hover {
  border-color: var(--color-primary-light);
}

.q-option-item.selected {
  border-color: var(--color-primary);
  background: var(--color-primary-50);
  box-shadow: 0 0 0 3px rgba(255, 123, 84, 0.15);
}

.q-color-swatch {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-full);
  border: 3px solid transparent;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.q-color-swatch:hover {
  transform: scale(1.1);
}

.q-color-swatch.selected {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 2px white, 0 0 0 4px var(--color-primary);
}

.q-upload-zone {
  border: 2px dashed var(--color-gray-300);
  border-radius: var(--radius-xl);
  padding: var(--space-8);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all var(--transition-normal);
  background: var(--color-bg-tertiary);
}

.q-upload-zone:hover {
  border-color: var(--color-primary);
  background: var(--color-primary-50);
}

.q-upload-zone.dragging {
  border-color: var(--color-primary);
  background: var(--color-primary-100);
  transform: scale(1.02);
}

.q-slider {
  width: 100%;
  height: 4px;
  border-radius: var(--radius-full);
  background: var(--color-gray-200);
  outline: none;
  -webkit-appearance: none;
}

.q-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  border-radius: var(--radius-full);
  background: var(--color-primary);
  cursor: pointer;
  box-shadow: var(--shadow-md);
}

/* Utilities */
.text-primary { color: var(--color-primary); }
.text-gray-400 { color: var(--color-gray-400); }
.text-gray-500 { color: var(--color-gray-500); }
.text-gray-600 { color: var(--color-gray-600); }
.bg-primary { background-color: var(--color-primary); }
.bg-primary-50 { background-color: var(--color-primary-50); }
.bg-white { background-color: white; }
.rounded-full { border-radius: var(--radius-full); }
.shadow-md { box-shadow: var(--shadow-md); }
.shadow-lg { box-shadow: var(--shadow-lg); }

        display: inline-flex;
        align-items: center;
        justify-content: center;

        mask-size: contain;

<body>

  <!-- Header -->
  <header class="flex items-center justify-between px-4 pt-3 pb-2" style="padding-top: env(safe-area-inset-top, 12px);">
    <button id="btn-back" class="flex items-center justify-center w-9 h-9 rounded-full" style="background: var(--color-bg-secondary); box-shadow: var(--shadow-sm); border:none; cursor:pointer;">
      <i data-lucide="chevron-left" style="width:20px;height:20px;color:var(--color-gray-700);"></i>
    </button>
    <h1 style="font-size:var(--font-size-lg);font-weight:var(--font-weight-semibold);color:var(--color-gray-800);">定制头像</h1>
    <button id="btn-shuffle" class="flex items-center justify-center w-9 h-9 rounded-full" style="background: var(--color-bg-secondary); box-shadow: var(--shadow-sm); border:none; cursor:pointer;">
      <i data-lucide="shuffle" style="width:18px;height:18px;color:var(--color-primary);"></i>
    </button>

  <!-- Tab Bar -->
  <div class="px-4 pb-3">
    <div class="q-tab">
      <button class="q-tab-item" data-dom-id="tab-upload">上传照片</button>

  <!-- Avatar Preview Area -->

    <div class="absolute" style="top:14px;left:26%; pointer-events:none;">

        <path d="M8 0L9.5 6.5L16 8L9.5 9.5L8 16L6.5 9.5L0 8L6.5 6.5Z" fill="var(--color-primary-300)" opacity="0.6"/>
      </svg>
    </div>
    <div class="absolute" style="top:28px;right:20%; pointer-events:none;">
      <svg width="14" height="14" viewBox="0 0 16 16" class="sparkle-2">
        <path d="M8 0L9.5 6.5L16 8L9.5 9.5L8 16L6.5 9.5L0 8L6.5 6.5Z" fill="var(--color-primary-200)" opacity="0.5"/>
      </svg>
    </div>
    <div class="absolute" style="bottom:28px;left:22%; pointer-events:none;">
      <svg width="12" height="12" viewBox="0 0 16 16" class="sparkle-3">
        <path d="M8 0L9.5 6.5L16 8L9.5 9.5L8 16L6.5 9.5L0 8L6.5 6.5Z" fill="var(--color-primary-400)" opacity="0.4"/>
      </svg>
    </div>

    <!-- Avatar Container -->
    <div class="avatar-float" style="width:180px;height:180px;border-radius:50%;overflow:hidden;border:4px solid var(--color-primary);box-shadow:var(--shadow-lg);filter:drop-shadow(0 8px 20px rgba(255,123,84,0.2));background:white;">
      <svg id="avatar-preview" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block;">
        <!-- Render order: bottom to top -->
        <g id="av-clothing"></g>
        <g id="av-face"></g>
        <g id="av-hair"></g>
        <g id="av-eyes"></g>
        <g id="av-mouth"></g>
        <g id="av-accessory"></g>
      </svg>
    </div>

    <p class="mt-3" style="font-size:var(--font-size-sm);color:var(--color-gray-400);">点击各部位可单独编辑</p>
  </div>

  <!-- Category Pills -->
  <div class="px-4 py-2">
    <div id="category-bar" class="flex gap-2 overflow-x-auto no-scrollbar pb-1" style="scroll-snap-type:x mandatory;">
      <button class="q-category-pill active" data-category="face" onclick="onCategoryClick('face')">
        <span style="font-size:14px;line-height:1;">&#128170;</span> 脸型
      </button>
      <button class="q-category-pill" data-category="hair" onclick="onCategoryClick('hair')">
        <span style="font-size:14px;line-height:1;">&#128136;</span> 发型
      </button>
      <button class="q-category-pill" data-category="eyes" onclick="onCategoryClick('eyes')">
        <span style="font-size:14px;line-height:1;">&#128064;</span> 眼睛
      </button>
      <button class="q-category-pill" data-category="mouth" onclick="onCategoryClick('mouth')">
        <span style="font-size:14px;line-height:1;">&#128522;</span> 嘴巴
      </button>
      <button class="q-category-pill" data-category="clothing" onclick="onCategoryClick('clothing')">
        <span style="font-size:14px;line-height:1;">&#128085;</span> 服饰
      </button>
      <button class="q-category-pill" data-category="accessory" onclick="onCategoryClick('accessory')">
        <span style="font-size:14px;line-height:1;">&#128081;</span> 配饰
      </button>
    </div>
  </div>

  <!-- Color Picker Section -->
  <div class="px-4 py-1">
    <div id="color-picker-section" class="q-card">
      <!-- Dynamically rendered by JS -->
    </div>
  </div>

  <!-- Material Grid Section -->
  <div class="px-4 py-2">
    <div class="q-card">
      <div class="flex items-center justify-between mb-3">
        <span id="grid-title" style="font-size:var(--font-size-sm);font-weight:var(--font-weight-semibold);color:var(--color-gray-700);">脸型款式</span>
        <span id="grid-count" style="font-size:var(--font-size-xs);color:var(--color-gray-400);">6款可选</span>
      </div>
      <div id="option-grid" class="q-option-grid">
        <!-- Dynamically rendered by JS -->
      </div>
    </div>
  </div>

  <!-- Spacer -->
  <div style="height:16px;"></div>

  <!-- Save Button -->
  <div class="px-4 pb-6">
    <button id="btn-save" class="q-button-primary w-full flex items-center justify-center gap-2" data-dom-id="save-avatar" style="padding:14px 0;font-size:var(--font-size-md);border:none;">
      <i data-lucide="check" style="width:20px;height:20px;"></i>

  <div style="height:env(safe-area-inset-bottom, 0px);"></div>

  // ============================================================
  // Render: Grid Thumbnails
  // ============================================================
  function getThumbnailSVG(category, index) {
    let inner = '';
    switch (category) {
      case 'face':
        inner = applyColors(faceShapes[index]) +
          '<ellipse cx="68" cy="100" rx="10" ry="6" fill="#FFB090" opacity="0.4"/>' +
          '<ellipse cx="132" cy="100" rx="10" ry="6" fill="#FFB090" opacity="0.4"/>';
        break;
      case 'hair':
        inner = '<ellipse cx="100" cy="95" rx="44" ry="46" fill="' + state.skinColor + '"/>' +
          applyColors(hairStyles[index]);
        break;
      case 'eyes':
        inner = eyeStyles[index];
        break;
      case 'mouth':
        inner = mouthStyles[index];
        break;
      case 'clothing':
        inner = applyColors(clothingStyles[index]);
        break;
      case 'accessory':
        if (index === 0) {
          inner = '<line x1="75" y1="75" x2="125" y2="125" stroke="#D4D0CA" stroke-width="3" stroke-linecap="round"/>' +
                  '<line x1="125" y1="75" x2="75" y2="125" stroke="#D4D0CA" stroke-width="3" stroke-linecap="round"/>';
        } else {
          inner = '<ellipse cx="100" cy="95" rx="44" ry="46" fill="' + state.skinColor + '" opacity="0.25"/>' +
            accessoryStyles[index];
        }
        break;
    }
    return '<svg viewBox="0 0 200 200" width="56" height="56" xmlns="http://www.w3.org/2000/svg">' + inner + '</svg>';
  }

  function renderGrid() {
    const cat = state.activeCategory;
    const config = categoryConfig[cat];
    const labels = labelMap[cat];
    const selectedIndex = state[cat];
    let count = 0;
    switch (cat) {
      case 'face': count = faceShapes.length; break;
      case 'hair': count = hairStyles.length; break;
      case 'eyes': count = eyeStyles.length; break;
      case 'mouth': count = mouthStyles.length; break;
      case 'clothing': count = clothingStyles.length; break;
      case 'accessory': count = accessoryStyles.length; break;
    }

    document.getElementById('grid-title').textContent = config.title;
    document.getElementById('grid-count').textContent = count + '款可选';

    const grid = document.getElementById('option-grid');
    let html = '';
    for (let i = 0; i < count; i++) {
      const isSelected = (i === selectedIndex);
      const selClass = isSelected ? ' selected' : '';
      const badge = isSelected
        ? '<div class="check-badge"><svg width="10" height="10" viewBox="0 0 16 16"><path d="M4 8L7 11L12 5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'
        : '';
      html += '<div class="q-option-item' + selClass + '" data-index="' + i + '" onclick="onOptionClick(' + i + ')">' +
        getThumbnailSVG(cat, i) +
        badge +
        '<span class="option-label">' + (labels[i] || '') + '</span>' +
        '</div>';
    }
    grid.innerHTML = html;
  }

  // ============================================================
  // Render: Color Picker
  // ============================================================
  function renderColorPicker() {
    const container = document.getElementById('color-picker-section');
    const cat = state.activeCategory;
    const colorKey = categoryConfig[cat].colorKey;

    if (!colorKey) {
      // No color picker needed
      container.innerHTML =
        '<div class="flex items-center justify-center py-2" style="color:var(--color-gray-400);font-size:var(--font-size-sm);">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px;flex-shrink:0;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>' +
          '当前类别无需选色' +
        '</div>';
      return;
    }

    let colors, currentColor, colorNames;
    if (colorKey === 'skin') {
      colors = skinColors;
      currentColor = state.skinColor;
      colorNames = ['浅肤色','暖肤色','自然色','小麦色','古铜色','深棕色'];
    } else if (colorKey === 'hair') {
      colors = hairColors;
      currentColor = state.hairColor;
      colorNames = ['深棕','巧克力','金棕','金色','纯黑','红色'];
    } else {
      colors = clothingColors;
      currentColor = state.clothingColor;
      colorNames = ['橙色','绿色','紫色','蓝色','黄色','红色'];
    }

    let html = '<div class="flex items-center gap-2 mb-2">' +
      '<span style="font-size:var(--font-size-sm);font-weight:var(--font-weight-semibold);color:var(--color-gray-700);">' +
      (colorKey === 'skin' ? '肤色选择' : colorKey === 'hair' ? '发色选择' : '服饰配色') +
      '</span>' +
      '<span style="font-size:var(--font-size-xs);color:var(--color-gray-400);">轻触切换</span>' +
      '</div>' +
      '<div class="flex items-center gap-3 flex-wrap">';

    for (let i = 0; i < colors.length; i++) {
      const sel = (colors[i] === currentColor) ? ' selected' : '';
      html += '<button class="q-color-swatch' + sel + '" style="background:' + colors[i] + ';" title="' + colorNames[i] + '" onclick="onColorClick(\'' + colorKey + '\',\'' + colors[i] + '\')"></button>';
    }

    html += '</div>';
    container.innerHTML = html;
  }

  // ============================================================
  // Event Handlers
  // ============================================================

  // Category click
  function onCategoryClick(category) {
    if (state.activeCategory === category) return;
    state.activeCategory = category;

    // Update pills
    document.querySelectorAll('.q-category-pill').forEach(function(pill) {
      if (pill.dataset.category === category) {
        pill.classList.add('active');
        pill.classList.add('bounce-in');
        setTimeout(function() { pill.classList.remove('bounce-in'); }, 400);
      } else {
        pill.classList.remove('active');
      }
    });

    // Update grid and color picker
    renderGrid();
    renderColorPicker();
  }

  // Option click (select a part)
  function onOptionClick(index) {
    state[state.activeCategory] = index;

    // Update preview
    renderPreview();

    // Update grid selection visuals
    renderGrid();

    // Add bounce animation to the clicked item
    var items = document.querySelectorAll('.q-option-item');
    if (items[index]) {
      items[index].classList.add('bounce-in');
      setTimeout(function() { items[index].classList.remove('bounce-in'); }, 400);
    }
  }

  // Color click
  function onColorClick(colorKey, color) {
    if (colorKey === 'skin') {
      state.skinColor = color;
    } else if (colorKey === 'hair') {
      state.hairColor = color;
    } else if (colorKey === 'clothing') {
      state.clothingColor = color;
    }

    // Re-render affected parts
    if (colorKey === 'skin') {
      // Skin affects face and clothing (neck/arms)
      renderPreview();
    } else if (colorKey === 'hair') {
      renderPreview();
    } else if (colorKey === 'clothing') {
      renderPreview();
    }

    // Update color picker selection ring
    renderColorPicker();

    // Update grid thumbnails (they use current colors)
    renderGrid();
  }

  // Shuffle (randomize all)
  function onShuffle() {
    state.face = Math.floor(Math.random() * faceShapes.length);
    state.hair = Math.floor(Math.random() * hairStyles.length);
    state.eyes = Math.floor(Math.random() * eyeStyles.length);
    state.mouth = Math.floor(Math.random() * mouthStyles.length);
    state.clothing = Math.floor(Math.random() * clothingStyles.length);
    state.accessory = Math.floor(Math.random() * accessoryStyles.length);

    state.skinColor = skinColors[Math.floor(Math.random() * skinColors.length)];
    state.hairColor = hairColors[Math.floor(Math.random() * hairColors.length)];
    state.clothingColor = clothingColors[Math.floor(Math.random() * clothingColors.length)];

    renderPreview();
    renderGrid();
    renderColorPicker();
  }

  // Save button
  function onSave() {
    var btn = document.getElementById('btn-save');
    if (!btn) return;
    btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;"><path d="M20 6L9 17l-5-5"/></svg> 保存成功!';
    btn.style.background = 'var(--color-success)';
    btn.style.boxShadow = '0 4px 16px rgba(74,222,128,0.35)';
    setTimeout(function() {
      btn.innerHTML = '<i data-lucide="check" style="width:20px;height:20px;"></i> 保存头像';
      btn.style.background = '';
      btn.style.boxShadow = '';
      lucide.createIcons();
    }, 1500);
  }

  // ============================================================
  // Tab switching
  // ============================================================
  var tabUpload = document.querySelector('[data-dom-id="tab-upload"]');
  var tabCustomize = document.querySelector('[data-dom-id="tab-customize"]');
  if (tabUpload) {
    tabUpload.addEventListener('click', function() {
      tabUpload.classList.add('active');
      if (tabCustomize) tabCustomize.classList.remove('active');
    });
  }
  if (tabCustomize) {
    tabCustomize.addEventListener('click', function() {
      tabCustomize.classList.add('active');
      if (tabUpload) tabUpload.classList.remove('active');
    });
  }

  // ============================================================
  // Save button binding
  // ============================================================
  var saveBtn = document.getElementById('btn-save');
  if (saveBtn) {
    saveBtn.addEventListener('click', onSave);
  }

  // ============================================================
  // Shuffle button binding
  // ============================================================
  var shuffleBtn = document.getElementById('btn-shuffle');
  if (shuffleBtn) {
    shuffleBtn.addEventListener('click', onShuffle);
  }

  // ============================================================
  // Initial render
  // ============================================================
  renderPreview();
  renderGrid();
  renderColorPicker();
  </script>
</body>
</html>
